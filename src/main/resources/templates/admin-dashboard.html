<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>CampusBook — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:#05080f;
  --surface:#0d1220;
  --border:#1e2d45;
  --accent:#00d4ff;
  --accent2:#7c3aed;
  --text:#e8f0fe;
  --muted:#64748b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* Navbar */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid var(--border);
}

.logo {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:20px;
}

.logo span {
  color: var(--accent);
}

.logout {
  text-decoration:none;
  color: var(--accent);
  font-size:14px;
}

/* Main */
.container {
  padding:40px;
}

h1 {
  font-family:'Syne', sans-serif;
  font-size:32px;
  margin-bottom:10px;
}

.subtitle {
  color: var(--muted);
  margin-bottom:30px;
}

/* Cards */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
}

.card {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
  transition:0.2s;
  cursor:pointer;
}

.card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
}

.card h3 {
  margin-bottom:10px;
}

.card p {
  color: var(--muted);
  font-size:14px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Campus<span>Book</span></div>
  <a href="/logout" class="logout">Logout</a>
</div>

<!-- CONTENT -->
<div class="container">
  <h1>Admin Dashboard</h1>
  <p class="subtitle">Manage resources and monitor system activity</p>

  <div class="grid">

    <div class="card" onclick="window.location.href='/resource/all'">
      <h3>View Resources</h3>
      <p>See all rooms, labs and availability</p>
    </div>

    <div class="card">
      <h3>Manage Bookings</h3>
      <p>View and control all bookings</p>
    </div>

    <div class="card">
      <h3>Conflict Reports</h3>
      <p>Check booking conflicts in system</p>
    </div>

    <div class="card">
      <h3>Add Resource</h3>
      <p>Create new rooms or labs</p>
    </div>

  </div>
</div>

</body>
</html>
